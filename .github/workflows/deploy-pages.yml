name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate source
        run: |
          npm run lint
          npm run typecheck

      - name: Refresh public Chess.com snapshot
        run: node scripts/update-chess-snapshot.mjs

      - name: Build static site
        run: npm run build

      - name: Test production build
        run: npm run test:unit

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp -R dist/client/. _site/
          node scripts/prepare-github-pages.mjs _site "$GITHUB_REPOSITORY"
          node scripts/verify-pages-artifact.mjs _site "$GITHUB_REPOSITORY"
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
